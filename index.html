<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gujarat Titans - Official IPL Team</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <!-- Header -->
    <header class="header">
        <nav class="navbar">
            <div class="nav-container">
                <div class="logo">
                    <img src="assets/images/4.png" alt="GT Logo">
                    <span>Gujarat Titans</span>
                </div>
                <ul class="nav-menu">
                    <li><a href="#home" class="nav-link">Home</a></li>
                    <li><a href="#team" class="nav-link">Team</a></li>
                    <li><a href="#schedule" class="nav-link">Schedule</a></li>
                    <li><a href="#gallery" class="nav-link">Gallery</a></li>
                    <li><a href="#tickets" class="nav-link">Tickets</a></li>
                </ul>
                <div class="hamburger">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </nav>
    </header>

    <!-- Hero -->
    <section id="home" class="hero">
        <div class="hero-content">
            <h1 class="hero-title">Gujarat Titans</h1>
            <p class="hero-subtitle">IPL 2025 Champions</p>
            <div class="hero-buttons">
                <a href="#tickets" class="btn btn-primary">Buy Tickets</a>
                <a href="#team" class="btn btn-secondary">Our Team</a>
            </div>
        </div>
        <div class="hero-image">
            <img src="assets/images/hero.jpg" alt="GT Hero">
        </div>
    </section>

    <!-- Team -->
    <section id="team" class="team-section">
        <div class="container">
            <h2 class="section-title">Star Players</h2>
            <div class="team-grid" id="teamGrid"></div>
        </div>
    </section>

    <!-- Schedule -->
    <section id="schedule" class="schedule-section">
        <div class="container">
            <h2 class="section-title">Match Schedule</h2>
            <div class="schedule-tabs">
                <button class="tab-btn active" data-tab="upcoming">Upcoming</button>
                <button class="tab-btn" data-tab="recent">Results</button>
            </div>
            <div class="tab-content">
                <div id="upcoming" class="tab-pane active"></div>
                <div id="recent" class="tab-pane"></div>
            </div>
        </div>
    </section>

    <!-- Gallery -->
    <section id="gallery" class="gallery-section">
        <div class="container">
            <h2 class="section-title">Gallery</h2>
            <div class="gallery-grid" id="galleryGrid"></div>
        </div>
    </section>

    <!-- Tickets -->
    <section id="tickets" class="tickets-section">
        <div class="container">
            <h2 class="section-title">Tickets</h2>
            <div class="ticket-prices">
                <div class="price-card">
                    <h4>Regular</h4><span class="price">₹999</span>
                </div>
                <div class="price-card premium">
                    <h4>Premium</h4><span class="price">₹1999</span>
                </div>
                <div class="price-card vip">
                    <h4>VIP</h4><span class="price">₹4999</span>
                </div>
            </div>
            <button class="btn btn-large">Book Now</button>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 Gujarat Titans. All Rights Reserved.</p>
            <div class="social-links">
                <a href="#"><i class="fab fa-github"></i></a>
                <a href="#"><i class="fab fa-linkedin"></i></a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
